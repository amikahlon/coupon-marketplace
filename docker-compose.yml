services:
  db:
    image: postgres:16-alpine
    container_name: coupon-marketplace-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    container_name: coupon-marketplace-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://nexus:nexus@db:5432/nexus?schema=public"
      PORT: "4000"
      NODE_ENV: production
      RESELLER_API_TOKEN: "reseller-dev-token-change-me"
      ADMIN_API_TOKEN: "admin-dev-token-change-me"
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npx tsx src/server.ts"

  studio:
    build: ./backend
    container_name: coupon-marketplace-studio
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://nexus:nexus@db:5432/nexus?schema=public"
    ports:
      - "5555:5555"
    command: sh -c "npx prisma studio --port 5555 --browser none"

  frontend:
    build: ./frontend
    container_name: coupon-marketplace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
